services:
  db:
    image: postgres:17
    environment:
      POSTGRES_DB: hermesdeck
      POSTGRES_USER: hermesdeck
      POSTGRES_PASSWORD: hermesdeck_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hermesdeck -d hermesdeck"]
      interval: 10s
      timeout: 5s
      retries: 5

  agent-service:
    build:
      context: .
      dockerfile: docker/agent-service.Dockerfile
    ports:
      - "50051:50051"
      - "8000:8000"

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    ports:
      - "8080:8080"
    environment:
      POSTGRES_CONNECTION: "Host=db;Database=hermesdeck;Username=hermesdeck;Password=hermesdeck_dev"
      TELEGRAM_BOT_TOKEN: ""
    depends_on:
      db:
        condition: service_healthy
      agent-service:
        condition: service_started

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    ports:
      - "80:80"

volumes:
  postgres_data:
